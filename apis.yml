aid: api-stack
name: API Stack
description: >-
  API Stack is a free directory and discovery platform powered by Apideck that
  catalogs 213+ third-party API tools and services across 50+ categories
  including API gateways, management, design, authentication, developer portals,
  specifications, testing, security, monitoring, and marketplaces, helping
  developers discover and evaluate the right API tooling for their needs.
